<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — KG Digital</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,300;0,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #050508;
    color: #f0f4ff;
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.2rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #f0f4ff;
    margin-bottom: 3.5rem;
  }
  .logo span { color: #3b82f6; }
  .code {
    font-family: 'Syne', sans-serif;
    font-size: clamp(6rem, 22vw, 10rem);
    font-weight: 800;
    line-height: 1;
    background: linear-gradient(135deg, #2563c4 0%, #3b82f6 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(1.2rem, 3vw, 1.6rem);
    font-weight: 700;
    margin: 1.5rem 0 0.75rem;
    letter-spacing: -0.02em;
  }
  p {
    color: rgba(240,244,255,0.45);
    font-size: 1rem;
    max-width: 380px;
    line-height: 1.75;
    margin-bottom: 2.5rem;
  }
  .btn {
    display: inline-block;
    padding: 0.9rem 2.2rem;
    background: linear-gradient(135deg, #2563c4, #3b82f6);
    color: #fff;
    text-decoration: none;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.82rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border-radius: 2px;
    transition: opacity 0.2s ease;
  }
  .btn:hover { opacity: 0.82; }
  .btn:focus-visible { outline: 2px solid #3b82f6; outline-offset: 3px; }
</style>
</head>
<body>
  <div class="logo">KG<span>Digital</span></div>
  <div class="code">404</div>
  <h1>Page Not Found</h1>
  <p>The page you're looking for doesn't exist or may have been moved. Head back to the homepage.</p>
  <a href="/" class="btn">&#8592; Back to Home</a>
</body>
</html>
