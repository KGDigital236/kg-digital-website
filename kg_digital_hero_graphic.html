
<style>
#hero{position:relative;width:100%;height:460px;background:#050810;border-radius:16px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-family:'Courier New',monospace;}
#hero canvas{position:absolute;inset:0;}
.hero-content{position:relative;z-index:2;text-align:center;}
.hero-title{font-family:Georgia,serif;font-size:42px;font-weight:700;color:#fff;letter-spacing:-1px;margin:0;}
.hero-title span{color:#4f9eff;}
.hero-sub{font-size:13px;color:rgba(255,255,255,0.45);letter-spacing:4px;text-transform:uppercase;margin:10px 0 0;}
.hero-line{width:40px;height:1px;background:#4f9eff;margin:16px auto 0;}
</style>
<div id="hero">
<canvas id="bgc"></canvas>
<div class="hero-content">
  <p class="hero-sub">Web Development Studio</p>
  <h1 class="hero-title">KG <span>Digital</span></h1>
  <div class="hero-line"></div>
</div>
</div>
<script>
const c = document.getElementById('bgc');
const ctx = c.getContext('2d');
const hero = document.getElementById('hero');
let W, H;
function resize(){W=c.width=hero.offsetWidth;H=c.height=hero.offsetHeight;}
resize();

const rings = Array.from({length:5},(_,i)=>({
  r: 60 + i*55,
  speed: (i%2===0?1:-1)*(0.12 - i*0.018),
  angle: i*1.2,
  nodes: 5+i*2,
  dash: [6+i*2, 8+i*3]
}));

const floats = Array.from({length:18},()=>({
  x: Math.random()*800,
  y: Math.random()*460,
  r: Math.random()*1.5+0.5,
  vx:(Math.random()-0.5)*0.3,
  vy:(Math.random()-0.5)*0.3,
  alpha:Math.random()*0.5+0.2
}));

let mouse={x:W/2,y:H/2};
hero.addEventListener('mousemove',e=>{
  const r=hero.getBoundingClientRect();
  mouse.x=e.clientX-r.left; mouse.y=e.clientY-r.top;
});

function drawRing(ring){
  const cx=W/2+(mouse.x-W/2)*0.04;
  const cy=H/2+(mouse.y-H/2)*0.04;
  ctx.save();
  ctx.translate(cx,cy);
  ctx.rotate(ring.angle);
  ctx.setLineDash(ring.dash);
  ctx.strokeStyle=`rgba(79,158,255,${0.12-ring.nodes*0.005})`;
  ctx.lineWidth=0.8;
  ctx.beginPath();
  ctx.arc(0,0,ring.r,0,Math.PI*2);
  ctx.stroke();
  ctx.setLineDash([]);
  for(let i=0;i<ring.nodes;i++){
    const a=(i/ring.nodes)*Math.PI*2;
    const nx=Math.cos(a)*ring.r;
    const ny=Math.sin(a)*ring.r;
    ctx.beginPath();
    ctx.arc(nx,ny,2,0,Math.PI*2);
    ctx.fillStyle=`rgba(79,158,255,${0.5-ring.nodes*0.03})`;
    ctx.shadowBlur=8;ctx.shadowColor='#4f9eff';
    ctx.fill();
    ctx.shadowBlur=0;
    const nx2=Math.cos(a+Math.PI*2/ring.nodes)*ring.r;
    const ny2=Math.sin(a+Math.PI*2/ring.nodes)*ring.r;
    ctx.beginPath();
    ctx.moveTo(nx,ny);ctx.lineTo(0,0);
    ctx.strokeStyle=`rgba(79,158,255,0.04)`;
    ctx.lineWidth=0.5;
    ctx.stroke();
  }
  ctx.restore();
}

function loop(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#050810';
  ctx.fillRect(0,0,W,H);

  floats.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<0||p.x>W)p.vx*=-1;
    if(p.y<0||p.y>H)p.vy*=-1;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(79,158,255,${p.alpha})`;
    ctx.fill();
  });

  rings.forEach(r=>{r.angle+=r.speed*0.008;drawRing(r);});

  const grd=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,220);
  grd.addColorStop(0,'rgba(79,158,255,0.06)');
  grd.addColorStop(1,'transparent');
  ctx.fillStyle=grd;
  ctx.fillRect(0,0,W,H);

  requestAnimationFrame(loop);
}
loop();
</script>
