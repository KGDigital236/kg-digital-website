<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading Demo - KG Digital</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #050508;
    --deep: #080d1a;
    --navy: #0a1628;
    --bright-blue: #3b82f6;
    --sky: #60a5fa;
    --white: #f0f4ff;
  }
  
  body, html {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: var(--black);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
  }

  /* Noise overlay matching the site */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.03;
    pointer-events: none;
    z-index: 10;
  }

  /* Glowing background blob matching hero */
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    animation: blobPulse 3s ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 1;
  }
  .blob-center {
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(37,99,196,0.15) 0%, transparent 70%);
  }

  @keyframes blobPulse {
    0% { transform: scale(0.8); opacity: 0.5; }
    100% { transform: scale(1.1); opacity: 1; }
  }

  .loader-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 20;
  }

  .logo-text {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 3.5rem;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, var(--white) 0%, var(--pale) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 2rem;
    opacity: 0;
    animation: fadeInGlow 2s ease-in-out forwards;
  }

  .logo-text span {
    background: linear-gradient(135deg, var(--bright-blue) 0%, var(--sky) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  @keyframes fadeInGlow {
    0% { opacity: 0; transform: translateY(10px); filter: drop-shadow(0 0 0px rgba(59,130,246,0)); }
    100% { opacity: 1; transform: translateY(0); filter: drop-shadow(0 0 15px rgba(59,130,246,0.4)); }
  }

  .progress-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    opacity: 0;
    animation: fadeIn 1s ease-in-out 0.5s forwards;
  }

  .progress-bar {
    width: 240px;
    height: 2px;
    background: rgba(240,244,255,0.08);
    position: relative;
    overflow: hidden;
    border-radius: 2px;
  }

  .progress-line {
    position: absolute;
    top: 0; left: 0;
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, transparent, var(--bright-blue), var(--sky));
    animation: progressAnim 2s cubic-bezier(0.65, 0, 0.35, 1) infinite;
  }

  @keyframes progressAnim {
    0% { width: 0%; left: -100%; }
    50% { width: 100%; left: 0%; }
    100% { width: 100%; left: 100%; }
  }

  .loading-text {
    font-size: 0.7rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: rgba(96,165,250,0.6);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    animation: pulseText 1.5s infinite;
  }

  @keyframes pulseText {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

</style>
</head>
<body>

<div class="blob blob-center"></div>

<div class="loader-container">
  <div class="logo-text">KG<span>Digital</span></div>
  <div class="progress-wrapper">
    <div class="progress-bar">
      <div class="progress-line"></div>
    </div>
    <div class="loading-text">Loading Experience</div>
  </div>
</div>

</body>
</html>
